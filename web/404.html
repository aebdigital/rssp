<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Stránka nenájdená (404) - Stavebný sociálny podnik s.r.o.</title>
    
    <!-- Meta Description -->
    <meta name="description" content="Stránka, ktorú hľadáte nebola nájdená. Vráťte sa na hlavnú stránku Stavebného sociálneho podniku s.r.o.">
    <meta name="robots" content="noindex, nofollow">
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            text-align: center;
            padding: 20px;
        }
        
        .error-content {
            background: white;
            padding: 60px 40px;
            border-radius: 10px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }
        
        .error-code {
            font-size: 6rem;
            font-weight: bold;
            color: #265286;
            margin-bottom: 20px;
            line-height: 1;
        }
        
        .error-title {
            font-size: 2rem;
            color: #333;
            margin-bottom: 20px;
        }
        
        .error-description {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .error-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .error-btn {
            background: #265286;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: background-color 0.3s ease;
        }
        
        .error-btn:hover {
            background: #1e4066;
        }
        
        .error-btn.secondary {
            background: transparent;
            color: #265286;
            border: 2px solid #265286;
        }
        
        .error-btn.secondary:hover {
            background: #265286;
            color: white;
        }
        
        @media (max-width: 600px) {
            .error-content {
                padding: 40px 20px;
            }
            
            .error-code {
                font-size: 4rem;
            }
            
            .error-title {
                font-size: 1.5rem;
            }
            
            .error-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .error-btn {
                width: 100%;
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <main class="error-page">
        <div class="error-content">
            <div class="error-code">404</div>
            <h1 class="error-title">Stránka nenájdená</h1>
            <p class="error-description">
                Ospravedlňujeme sa, ale stránka, ktorú hľadáte neexistuje alebo bola premiestnená.
            </p>
            <div class="error-buttons">
                <a href="/" class="error-btn">Domovská stránka</a>
                <a href="/sluzby" class="error-btn secondary">Naše služby</a>
            </div>
        </div>
    </main>
</body>
</html>
